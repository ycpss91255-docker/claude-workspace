# instincts.yaml -- structured, machine-readable repo conventions.
#
# Pilot for issue #95. Each entry is a convention that hooks / skills /
# slash commands can query via `.claude/scripts/instinct-query.sh
# <kind> [glob...]` instead of grepping CLAUDE.md prose.
#
# Schema (flat list of records):
#   - name:        kebab-case slug, stable across versions
#     trigger:
#       kind:      one of: file_edit | git_commit | gh_pr_create |
#                  gh_issue_create | bash_command
#       glob:      (optional, file_edit only) match against the
#                  edited file_path. Supports `**`.
#       not_glob:  (optional) negative glob to exclude paths
#     guidance:    list of one-line guidance bullets (plain text)
#     refs:        (optional) where the rule is documented in
#                  CLAUDE.md or elsewhere
#
# This file lives alongside CLAUDE.md, not as a replacement. CLAUDE.md
# carries the narrative; instincts.yaml carries the mechanical facts
# that tools can consult.

- name: shell-style-indent
  trigger:
    kind: file_edit
    glob: '**/*.sh'
  guidance:
    - 2-space indent (not tabs, not 4)
    - functions declared as `name() {`, NOT `function name { ... }`
    - `main()` wraps all top-level execution; bottom invokes `main "$@"`
  refs: CLAUDE.md > Google Style code review

- name: shell-style-bracket-and-substitution
  trigger:
    kind: file_edit
    glob: '**/*.sh'
  guidance:
    - use `[[ ]]` not `[ ]` for tests
    - use `$(...)` not backticks for command substitution
    - quote variable expansions ("$var") unless intentional word-splitting
  refs: CLAUDE.md > Google Style code review

- name: shell-style-variables
  trigger:
    kind: file_edit
    glob: '**/*.sh'
  guidance:
    - locals use `lower_snake_case` (declared with `local`)
    - globals use `UPPER_SNAKE_CASE` + `readonly`
    - all top-level execution lives inside `main()`
  refs: CLAUDE.md > Google Style code review

- name: no-emoji
  trigger:
    kind: file_edit
  guidance:
    - no emoji in code, docs, README, section headers, commit messages, PR bodies
    - the `check_no_emoji.sh` PostToolUse hook scans every Edit/Write
  refs: CLAUDE.md > 風格規範

- name: no-ai-attribution
  trigger:
    kind: file_edit
  guidance:
    - no AI-attribution markers in commit messages, PR bodies, or code comments
    - forbidden patterns - `Generated with [Claude Code]`, `Co-Authored-By: Claude`
    - both `check_no_ai_attribution.sh` (PostToolUse) and `remind_no_ai_attribution.sh` (PreToolUse Bash) enforce
  refs: CLAUDE.md > 風格規範

- name: commit-title-conventional
  trigger:
    kind: git_commit
  guidance:
    - first line uses conventional prefix - `feat:` / `fix:` / `docs:` / `refactor:` / `chore:`
    - keep subject under 72 chars; details go in the body
    - NO AI-attribution lines (`Co-Authored-By: Claude`, `Generated with Claude Code`)
  refs: CLAUDE.md > 變更分類與流程 + 風格規範

- name: pr-title-conventional
  trigger:
    kind: gh_pr_create
  guidance:
    - title under 70 chars, conventional prefix (`feat:` / `fix:` / `docs:` etc.)
    - details go in the body, not the title
  refs: .claude/commands/pr.md

- name: gh-body-file
  trigger:
    kind: gh_pr_create
  guidance:
    - long PR / issue bodies always go through `--body-file /tmp/<name>.md`
    - never inline a multi-line body via `--body "$(cat ...)"` or heredoc
    - the `enforce_gh_body_file.sh` PreToolUse hook BLOCKS these patterns
  refs: .claude/skills/gh-artifact-format/SKILL.md

- name: gh-issue-body-file
  trigger:
    kind: gh_issue_create
  guidance:
    - same body-file rule as PR create -- write to `/tmp/<name>.md` first
    - draft in zh-TW for user review, translate to English at submission
  refs: .claude/skills/gh-artifact-format/SKILL.md

- name: batch-via-script
  trigger:
    kind: bash_command
  guidance:
    - never inline a for-loop that performs cross-repo mutation (git push|reset|tag|branch -D, or gh issue|pr close|merge|comment --body) -- DENIED by enforce_batch_via_script.sh
    - N-iteration loops fire N user prompts and induce yes-fatigue, effectively bypassing every ask rule downstream
    - write or reuse a permanent `.claude/scripts/<name>.sh` (one prompt for the whole batch); examples: `batch-pr-merge.sh`, `batch-template-upgrade.sh`, `batch-open-archive-rename-issues.sh`
    - read-only loops (gh pr view, git log, grep, cat) are NOT blocked -- only mutation
    - lift the gate via `/tmp` checkpoint protocol (ADR-00000002) -- touch the matching `<ack>` file and re-issue the same loop
  refs: CLAUDE.md > 跨 repo 批次 mutation 規範

- name: make-first-upgrade
  trigger:
    kind: bash_command
  guidance:
    - never run `./.base/upgrade.sh` directly when `Makefile.ci` has an `upgrade:` target -- DENIED by enforce_make_first_upgrade.sh
    - use the canonical wrapper `make -f Makefile.ci upgrade VERSION=vX.Y.Z` instead
    - the make wrapper internally runs the same upgrade.sh PLUS the init.sh symlink resync + main.yaml @tag sed steps that direct .sh invocation skips (refs issue #36)
    - lift the gate via the `/tmp` checkpoint protocol (ADR-00000002) -- the deny message quotes the matching `touch <ack-file>` command; re-issue the same upgrade.sh call after ack to proceed
  refs: ADR-00000005 prefer-make-over-raw-upgrade-sh

- name: semver-tag-via-script
  trigger:
    kind: bash_command
  guidance:
    - never raw `git tag v*` or `git push.*v[0-9]` -- BLOCKed by enforce_semver_tag_via_script.sh
    - use the canonical script `.claude/scripts/release-tag.sh <tag> -m "<msg>"` instead
    - X bump (vX.0.0) also requires `RELEASE_X_BUMP_ACK=<exact-tag>` env (set only after explicit user OK)
    - Y bump (vX.Y.0) and X bump both require a prior vX.Y.0-rcN tag with CI all success/skipped
    - Z bump (vX.Y.Z where Z>0) is bug fix only -- direct, no RC
  refs: .claude/skills/semver-bump/SKILL.md

- name: no-cd-git
  trigger:
    kind: bash_command
  guidance:
    - never `cd <path> && git ...` -- the cd changes session cwd and breaks Monitor inheritance
    - use `git -C <path> <subcommand>` instead -- same idiom as `make -C`
  refs: CLAUDE.md > Bash 命令寫法的 parser 限制

- name: tdd-four-categories
  trigger:
    kind: file_edit
    glob: '**/*.{sh,Dockerfile,yaml,yml}'
  guidance:
    - any code change must consider 4 test categories - smoke / unit / integration / lint
    - decide which apply based on the change shape (see CLAUDE.md table)
    - TEST.md is the single source of truth -- update counts when adding / removing @test
  refs: CLAUDE.md > 測試分類（TDD 必須涵蓋的 4 個面向）
